# =============================================================================
# PUBLIC CI — the AUTHORITATIVE heavy suite, ships to the public `opengeo` repo
#
# Managed by scripts/publish-public.sh (opengeo-workspace); installed as
# `.github/workflows/ci.yml` in the public `opengeo` repo.
#
# WHY HERE (Story 38.13): the public repo is PUBLIC → GitHub Actions are FREE
# and unlimited. The private `opengeo-workspace` is metered against GitHub Pro,
# so it runs only a lean gate (fmt/clippy/offline-unit/web-lint). The full,
# expensive validation — integration tests, coverage, Playwright e2e, compose
# smoke — runs HERE, where it costs nothing. This inverts Story 38.7.
#
# Self-contained: the public repo has no `scripts/` dir, so every step is inline.
# =============================================================================

name: ci

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  CARGO_INCREMENTAL: 0
  SQLX_OFFLINE: "true"

jobs:
  # API-free change detection: git diff needs no token scope.
  paths-filter:
    name: Detect changed paths
    runs-on: ubuntu-latest
    outputs:
      rust: ${{ steps.filter.outputs.rust }}
      web: ${{ steps.filter.outputs.web }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - id: filter
        env:
          EVENT: ${{ github.event_name }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          BEFORE: ${{ github.event.before }}
        run: |
          set -euo pipefail
          if [ "$EVENT" = "workflow_dispatch" ]; then
            { echo "rust=true"; echo "web=true"; } >> "$GITHUB_OUTPUT"; exit 0
          fi
          if [ "$EVENT" = "pull_request" ]; then base="$BASE_SHA"; else base="$BEFORE"; fi
          if [ -z "$base" ] || [ "$base" = "0000000000000000000000000000000000000000" ] \
             || ! git cat-file -e "${base}^{commit}" 2>/dev/null; then
            base="$(git rev-parse HEAD~1 2>/dev/null || git rev-parse HEAD)"
          fi
          changed="$(git diff --name-only "$base" HEAD)"
          echo "changed files:"; echo "$changed"
          rust=false; web=false
          if echo "$changed" | grep -qE '^(crates/|apps/(api|cli|worker|mcp)/|packages/sdk-go/|Cargo\.(toml|lock)|rust-toolchain\.toml|\.sqlx/|\.github/workflows/)'; then rust=true; fi
          if echo "$changed" | grep -qE '^(apps/web/|packages/sdk-(typescript|python)/|\.github/workflows/)'; then web=true; fi
          { echo "rust=$rust"; echo "web=$web"; } >> "$GITHUB_OUTPUT"

  rust-lint:
    name: Rust — fmt + clippy
    runs-on: ubuntu-latest
    needs: paths-filter
    if: needs.paths-filter.outputs.rust == 'true' || github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/checkout@v4
      - name: install libdbus + pkg-config
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libdbus-1-dev pkg-config
      - uses: dtolnay/rust-toolchain@1.95.0
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: cargo fmt --check
        run: cargo fmt --all --check
      - name: cargo clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

  # Full integration suite + Story-38.0 leak-guard contract (OSS builds green
  # standalone; no premium crate reachable from the OSS graph).
  rust-test:
    name: Rust — build + integration test
    runs-on: ubuntu-latest
    needs: paths-filter
    if: needs.paths-filter.outputs.rust == 'true' || github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/')
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: opengeo
          POSTGRES_PASSWORD: opengeo
          POSTGRES_DB: opengeo_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U opengeo -d opengeo_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgres://opengeo:opengeo@localhost:5432/opengeo_test
    steps:
      - uses: actions/checkout@v4
      - name: install libdbus + pkg-config
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libdbus-1-dev pkg-config
      - uses: dtolnay/rust-toolchain@1.95.0
      - uses: Swatinem/rust-cache@v2
      - name: leak-guard — OSS graph is premium-free
        run: |
          if cargo tree -e normal 2>/dev/null | grep -qiE 'opengeo-hallucination'; then
            echo "::error::premium crate reachable in the public OSS graph"; exit 1
          fi
          # Also ensure no premium/hallucination symbols leak into generated packages
          if grep -rqiE 'hallucination|premium_disabled|premium_enabled' packages/ 2>/dev/null; then
            echo "::error::premium symbol leaked into packages/ (generated SDKs or openapi artifact)"; exit 1
          fi
          echo "leak-guard: OSS graph is premium-free ✓"
      - name: cargo build --workspace
        run: cargo build --workspace --locked
      - name: parity-contract gate (Story 36.10 / RISK-4)
        # Explicit named step so the three-surface parity enforcement is visible
        # in the CI job log rather than buried in the full test run.
        # Fails if any registered capability lacks CLI/Web/MCP coverage without
        # an annotated single-surface exception (see crates/wire-schema/src/parity.rs).
        run: cargo test --locked -p opengeo-wire-schema --test parity_contract
      - name: cargo test --workspace
        run: cargo test --workspace --locked

  rust-coverage:
    name: Rust — coverage
    runs-on: ubuntu-latest
    needs: [paths-filter, rust-test]
    if: needs.paths-filter.outputs.rust == 'true' || github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/')
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: opengeo
          POSTGRES_PASSWORD: opengeo
          POSTGRES_DB: opengeo_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U opengeo -d opengeo_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgres://opengeo:opengeo@localhost:5432/opengeo_test
    steps:
      - uses: actions/checkout@v4
      - name: free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc \
            /opt/hostedtoolcache/CodeQL /usr/local/.ghcup /usr/share/swift || true
          sudo docker image prune --all --force || true
      - name: install libdbus + pkg-config
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libdbus-1-dev pkg-config
      - uses: dtolnay/rust-toolchain@1.95.0
        with:
          components: llvm-tools-preview
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@cargo-llvm-cov
      - name: coverage
        run: cargo llvm-cov --workspace --locked --lcov --output-path lcov.info
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: rust-coverage-lcov
          path: lcov.info
          retention-days: 30
          if-no-files-found: warn

  web-lint-unit:
    name: Web — lint + typecheck + vitest
    runs-on: ubuntu-latest
    needs: paths-filter
    if: needs.paths-filter.outputs.web == 'true' || github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/')
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: apps/web/pnpm-lock.yaml
      - name: pnpm install
        run: pnpm install --frozen-lockfile
      - name: lint
        run: pnpm lint
      - name: typecheck
        run: pnpm typecheck
      - name: build
        run: pnpm build
      - name: vitest
        run: pnpm test

  web-e2e:
    name: Web — Playwright (E2E + axe)
    runs-on: ubuntu-latest
    needs: [paths-filter, web-lint-unit]
    if: needs.paths-filter.outputs.web == 'true' || github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/')
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2]
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: apps/web/pnpm-lock.yaml
      - name: pnpm install
        run: pnpm install --frozen-lockfile
      - name: cache playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('apps/web/pnpm-lock.yaml') }}
      - name: install browsers
        run: pnpm exec playwright install --with-deps chromium
      - name: playwright shard ${{ matrix.shard }}/2
        run: pnpm exec playwright test --shard=${{ matrix.shard }}/2
      - name: upload trace artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-shard-${{ matrix.shard }}
          path: apps/web/playwright-report
          retention-days: 14

  compose-smoke:
    name: Compose — config + boot smoke
    runs-on: ubuntu-latest
    needs: [paths-filter, rust-test, web-lint-unit]
    if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/checkout@v4
      - name: validate compose config
        run: docker compose -f infra/docker/compose.yml config >/dev/null && echo "compose config valid ✓"
      - name: docker compose up + health-wait (≤120s)
        run: |
          docker compose -f infra/docker/compose.yml up -d
          deadline=$((SECONDS+120))
          until [ "$(docker compose -f infra/docker/compose.yml ps --status running -q | wc -l)" -gt 0 ] && \
                ! docker compose -f infra/docker/compose.yml ps | grep -qiE 'starting|unhealthy'; do
            [ "$SECONDS" -ge "$deadline" ] && { echo "::error::stack did not become healthy in 120s"; docker compose -f infra/docker/compose.yml ps; exit 1; }
            sleep 3
          done
          docker compose -f infra/docker/compose.yml ps
      - name: tear down
        if: always()
        run: docker compose -f infra/docker/compose.yml down -v || true

  release-sign:
    name: Release — signing hook
    runs-on: ubuntu-latest
    needs: [rust-lint, rust-test]
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4
      - name: verify tag annotation
        run: |
          tag="${GITHUB_REF#refs/tags/}"
          echo "Preparing release for tag: $tag"
          git tag -v "$tag" 2>/dev/null || echo "::notice::Tag is not GPG-signed; add cosign/minisign step here."
      - name: placeholder — add release artifact signing here
        run: echo "::notice::Wire cosign/minisign artifact signing in this step."

  # ---------------------------------------------------------------------------
  # notify-internal — fire repository_dispatch to opengeo-internal so the
  # auto-bump workflow picks up the new main commit within minutes rather than
  # waiting for the daily schedule.
  #
  # Requires: INTERNAL_DISPATCH_TOKEN secret in the opengeo repo — a PAT with
  # `repo` scope on leandropalazzo/opengeo-internal.
  # If the secret is absent the step is silently skipped (continue-on-error).
  # Story 38.18 documents this as best-effort; the daily schedule covers the gap.
  # ---------------------------------------------------------------------------
  notify-internal:
    name: Dispatch bump trigger to opengeo-internal
    runs-on: ubuntu-latest
    needs: [rust-test]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: repository_dispatch → opengeo-internal (opengeo-push)
        continue-on-error: true
        env:
          TOKEN: ${{ secrets.INTERNAL_DISPATCH_TOKEN }}
        run: |
          if [ -z "$TOKEN" ]; then
            echo "::notice::INTERNAL_DISPATCH_TOKEN not set — skipping dispatch (daily schedule covers the gap)."
            exit 0
          fi
          curl -f -s -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/leandropalazzo/opengeo-internal/dispatches" \
            -d '{"event_type":"opengeo-push","client_payload":{"sha":"${{ github.sha }}"}}'
          echo "Dispatched opengeo-push event to opengeo-internal."

  ci-summary:
    name: CI summary
    runs-on: ubuntu-latest
    needs:
      [paths-filter, rust-lint, rust-test, rust-coverage, web-lint-unit, web-e2e, compose-smoke]
    if: always()
    steps:
      - name: gate
        run: |
          echo "rust-lint:     ${{ needs.rust-lint.result }}"
          echo "rust-test:     ${{ needs.rust-test.result }}"
          echo "rust-coverage: ${{ needs.rust-coverage.result }}"
          echo "web-lint-unit: ${{ needs.web-lint-unit.result }}"
          echo "web-e2e:       ${{ needs.web-e2e.result }}"
          echo "compose-smoke: ${{ needs.compose-smoke.result }}"
          # skipped (path-filtered / event-gated) is acceptable; only failure/cancelled fail the gate.
          for r in \
            "${{ needs.rust-lint.result }}" "${{ needs.rust-test.result }}" \
            "${{ needs.rust-coverage.result }}" "${{ needs.web-lint-unit.result }}" \
            "${{ needs.web-e2e.result }}" "${{ needs.compose-smoke.result }}"; do
            if [[ "$r" == "failure" || "$r" == "cancelled" ]]; then
              echo "::error::A job failed or was cancelled."; exit 1
            fi
          done
          echo "CI gate: green (failed/cancelled = none; skipped = ok)."

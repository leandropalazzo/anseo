# =============================================================================
# PUBLIC CI — the AUTHORITATIVE heavy suite, ships to the public `opengeo` repo
#
# Managed by scripts/publish-public.sh (opengeo-workspace); installed as
# `.github/workflows/ci.yml` in the public `opengeo` repo.
#
# WHY HERE (Story 38.13): the public repo is PUBLIC → GitHub Actions are FREE
# and unlimited. The private `opengeo-workspace` is metered against GitHub Pro,
# so it runs only a lean gate (fmt/clippy/offline-unit/web-lint). The full,
# expensive validation — integration tests, coverage, Playwright e2e, compose
# smoke — runs HERE, where it costs nothing. This inverts Story 38.7.
#
# Self-contained: the public repo has no `scripts/` dir, so every step is inline.
# =============================================================================

name: ci

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  CARGO_INCREMENTAL: 0
  SQLX_OFFLINE: "true"

jobs:
  # API-free change detection: git diff needs no token scope.
  paths-filter:
    name: Detect changed paths
    runs-on: ubuntu-latest
    outputs:
      rust: ${{ steps.filter.outputs.rust }}
      web: ${{ steps.filter.outputs.web }}
      sdk_python: ${{ steps.filter.outputs.sdk_python }}
      sdk_typescript: ${{ steps.filter.outputs.sdk_typescript }}
      sdk_go: ${{ steps.filter.outputs.sdk_go }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - id: filter
        env:
          EVENT: ${{ github.event_name }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          BEFORE: ${{ github.event.before }}
        run: |
          set -euo pipefail
          if [ "$EVENT" = "workflow_dispatch" ]; then
            { echo "rust=true"; echo "web=true"; echo "sdk_python=true"; } >> "$GITHUB_OUTPUT"; exit 0
          fi
          if [ "$EVENT" = "pull_request" ]; then base="$BASE_SHA"; else base="$BEFORE"; fi
          if [ -z "$base" ] || [ "$base" = "0000000000000000000000000000000000000000" ] \
             || ! git cat-file -e "${base}^{commit}" 2>/dev/null; then
            base="$(git rev-parse HEAD~1 2>/dev/null || git rev-parse HEAD)"
          fi
          changed="$(git diff --name-only "$base" HEAD)"
          echo "changed files:"; echo "$changed"
          rust=false; web=false; sdk_python=false; sdk_typescript=false; sdk_go=false
          if echo "$changed" | grep -qE '^(crates/|apps/(api|cli|worker|mcp)/|Cargo\.(toml|lock)|rust-toolchain\.toml|\.sqlx/|\.github/workflows/)'; then rust=true; fi
          if echo "$changed" | grep -qE '^(apps/web/|\.github/workflows/)'; then web=true; fi
          if echo "$changed" | grep -qE '^(packages/sdk-python/|\.github/workflows/)'; then sdk_python=true; fi
          if echo "$changed" | grep -qE '^(packages/sdk-typescript/|\.github/workflows/)'; then sdk_typescript=true; fi
          if echo "$changed" | grep -qE '^(packages/sdk-go/|\.github/workflows/)'; then sdk_go=true; fi
          { echo "rust=$rust"; echo "web=$web"; echo "sdk_python=$sdk_python"; echo "sdk_typescript=$sdk_typescript"; echo "sdk_go=$sdk_go"; } >> "$GITHUB_OUTPUT"

  rust-lint:
    name: Rust — fmt + clippy
    runs-on: ubuntu-latest
    needs: paths-filter
    if: needs.paths-filter.outputs.rust == 'true' || github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/checkout@v4
      - name: install libdbus + pkg-config
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libdbus-1-dev pkg-config
      - uses: dtolnay/rust-toolchain@1.95.0
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: cargo fmt --check
        run: cargo fmt --all --check
      - name: cargo clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

  # Full integration suite + Story-38.0 leak-guard contract (OSS builds green
  # standalone; no premium crate reachable from the OSS graph).
  rust-test:
    name: Rust — build + integration test
    runs-on: ubuntu-latest
    needs: paths-filter
    if: needs.paths-filter.outputs.rust == 'true' || github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/')
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: opengeo
          POSTGRES_PASSWORD: opengeo
          POSTGRES_DB: opengeo_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U opengeo -d opengeo_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgres://opengeo:opengeo@localhost:5432/opengeo_test
    steps:
      - uses: actions/checkout@v4
      - name: install libdbus + pkg-config
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libdbus-1-dev pkg-config
      - uses: dtolnay/rust-toolchain@1.95.0
      - uses: Swatinem/rust-cache@v2
      - name: leak-guard — OSS graph is premium-free
        run: |
          if cargo tree -e normal 2>/dev/null | grep -qiE 'anseo-hallucination'; then
            echo "::error::premium crate reachable in the public OSS graph"; exit 1
          fi
          # Also ensure no premium/hallucination symbols leak into generated packages
          if grep -rqiE 'hallucination|premium_disabled|premium_enabled' packages/ 2>/dev/null; then
            echo "::error::premium symbol leaked into packages/ (generated SDKs or openapi artifact)"; exit 1
          fi
          echo "leak-guard: OSS graph is premium-free ✓"
      - name: cargo build --workspace
        run: cargo build --workspace --locked
      - name: parity-contract gate (Story 36.10 / RISK-4)
        # Explicit named step so the three-surface parity enforcement is visible
        # in the CI job log rather than buried in the full test run.
        # Fails if any registered capability lacks CLI/Web/MCP coverage without
        # an annotated single-surface exception (see crates/wire-schema/src/parity.rs).
        run: cargo test --locked -p anseo-wire-schema --test parity_contract
      - name: cargo test --workspace
        run: cargo test --workspace --locked

  # ---------------------------------------------------------------------------
  # rust-managed-pg — Story 37.4 AC4: the DUAL-BACKEND gate.
  #
  # `rust-test` above proves the schema + .sqlx cache run green against an
  # EXTERNAL Tier-2 Postgres (the `postgres:` service with DATABASE_URL set).
  # This job proves the OTHER half: it boots the MANAGED CHILD Postgres that
  # `anseo serve` provisions when DATABASE_URL is ABSENT — installing the PG
  # server binaries onto PATH (initdb/pg_ctl), NOT running them as a service —
  # and applies the SAME embedded migrations against it. Both backends green on
  # one set of migration files = the dual-backend gate.
  # ---------------------------------------------------------------------------
  rust-managed-pg:
    name: Rust — managed child Postgres (dual-backend gate)
    runs-on: ubuntu-latest
    needs: paths-filter
    if: needs.paths-filter.outputs.rust == 'true' || github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/checkout@v4
      - name: install libdbus + pkg-config + postgresql server binaries
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libdbus-1-dev pkg-config postgresql postgresql-contrib
          # Ubuntu installs the server tools under /usr/lib/postgresql/<ver>/bin
          # rather than on PATH; expose initdb/pg_ctl/createdb for the test.
          PG_BIN="$(dirname "$(find /usr/lib/postgresql -name pg_ctl | sort | tail -1)")"
          echo "discovered postgres bin dir: $PG_BIN"
          echo "$PG_BIN" >> "$GITHUB_PATH"
      - uses: dtolnay/rust-toolchain@1.95.0
      - uses: Swatinem/rust-cache@v2
      - name: verify initdb/pg_ctl are on PATH
        run: |
          which initdb pg_ctl createdb
          initdb --version
      - name: managed-child migration gate
        # SQLX_OFFLINE keeps the build from needing a live DATABASE_URL; the test
        # boots the child and runs migrations at RUNTIME. The env flag opts this
        # runner into the (slow, binary-dependent) boot.
        env:
          SQLX_OFFLINE: "true"
          ANSEO_TEST_MANAGED_PG: "1"
        run: cargo test --locked -p anseo-cli --test managed_pg_migrations -- --test-threads=1 --nocapture

  rust-coverage:
    name: Rust — coverage
    runs-on: ubuntu-latest
    needs: [paths-filter, rust-test]
    if: needs.paths-filter.outputs.rust == 'true' || github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/')
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: opengeo
          POSTGRES_PASSWORD: opengeo
          POSTGRES_DB: opengeo_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U opengeo -d opengeo_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgres://opengeo:opengeo@localhost:5432/opengeo_test
    steps:
      - uses: actions/checkout@v4
      - name: free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc \
            /opt/hostedtoolcache/CodeQL /usr/local/.ghcup /usr/share/swift || true
          sudo docker image prune --all --force || true
      - name: install libdbus + pkg-config
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libdbus-1-dev pkg-config
      - uses: dtolnay/rust-toolchain@1.95.0
        with:
          components: llvm-tools-preview
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@cargo-llvm-cov
      - name: coverage
        run: cargo llvm-cov --workspace --locked --lcov --output-path lcov.info
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: rust-coverage-lcov
          path: lcov.info
          retention-days: 30
          if-no-files-found: warn

  web-lint-unit:
    name: Web — lint + typecheck + vitest
    runs-on: ubuntu-latest
    needs: paths-filter
    if: needs.paths-filter.outputs.web == 'true' || github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/')
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: apps/web/pnpm-lock.yaml
      - name: pnpm install
        run: pnpm install --frozen-lockfile
      - name: lint
        run: pnpm lint
      - name: typecheck
        run: pnpm typecheck
      - name: build
        run: pnpm build
      - name: vitest
        run: pnpm test

  # Story 40.2 — instrumentation SDK (Python). Zero-runtime-dep package, so the
  # job only needs CPython + the dev extras (pytest/ruff/mypy). Self-contained.
  sdk-python-lint-test:
    name: SDK — Python (ruff + mypy --strict + pytest)
    runs-on: ubuntu-latest
    needs: paths-filter
    if: needs.paths-filter.outputs.sdk_python == 'true' || github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/')
    defaults:
      run:
        working-directory: packages/sdk-python
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: install (editable + dev extras)
        run: python -m pip install --upgrade pip && pip install -e ".[dev]"
      - name: ruff
        run: ruff check .
      - name: mypy --strict
        run: mypy
      - name: pytest
        run: python -m pytest -q

  # Story 40.3 — instrumentation SDK (TypeScript). Zero-runtime-dep package
  # (global fetch, Node >= 18); the job only needs Node + the dev deps
  # (typescript/eslint/vitest). Self-contained.
  sdk-typescript-lint-test:
    name: SDK — TypeScript (tsc --strict + eslint + vitest)
    runs-on: ubuntu-latest
    needs: paths-filter
    if: needs.paths-filter.outputs.sdk_typescript == 'true' || github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/')
    defaults:
      run:
        working-directory: packages/sdk-typescript
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: packages/sdk-typescript/pnpm-lock.yaml
      - name: pnpm install
        run: pnpm install --frozen-lockfile
      - name: typecheck (tsc --strict)
        run: pnpm typecheck
      - name: lint
        run: pnpm lint
      - name: vitest
        run: pnpm test

  # Story 40.3 — instrumentation SDK (Go). Standard-library-only module
  # (Go 1.22+); the job needs Go + staticcheck. Self-contained.
  sdk-go-lint-test:
    name: SDK — Go (go vet + staticcheck + go test)
    runs-on: ubuntu-latest
    needs: paths-filter
    if: needs.paths-filter.outputs.sdk_go == 'true' || github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/')
    defaults:
      run:
        working-directory: packages/sdk-go
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache-dependency-path: packages/sdk-go/go.mod
      - name: go build
        run: go build ./...
      - name: go vet
        run: go vet ./...
      - name: staticcheck
        run: |
          go install honnef.co/go/tools/cmd/staticcheck@latest
          "$(go env GOPATH)/bin/staticcheck" ./...
      - name: go test
        run: go test ./...

  web-e2e:
    name: Web — Playwright (E2E + axe)
    runs-on: ubuntu-latest
    needs: [paths-filter, web-lint-unit]
    if: needs.paths-filter.outputs.web == 'true' || github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/')
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2]
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: apps/web/pnpm-lock.yaml
      - name: pnpm install
        run: pnpm install --frozen-lockfile
      - name: cache playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('apps/web/pnpm-lock.yaml') }}
      - name: install browsers
        run: pnpm exec playwright install --with-deps chromium
      - name: playwright shard ${{ matrix.shard }}/2
        run: pnpm exec playwright test --shard=${{ matrix.shard }}/2
      - name: upload trace artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-shard-${{ matrix.shard }}
          path: apps/web/playwright-report
          retention-days: 14

  compose-smoke:
    name: Compose — config + boot smoke
    runs-on: ubuntu-latest
    needs: [paths-filter, rust-test, web-lint-unit]
    if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/checkout@v4
      - name: validate compose config
        run: docker compose -f infra/docker/compose.yml config >/dev/null && echo "compose config valid ✓"
      - name: docker compose up + health-wait (≤120s)
        run: |
          docker compose -f infra/docker/compose.yml up -d
          deadline=$((SECONDS+120))
          until [ "$(docker compose -f infra/docker/compose.yml ps --status running -q | wc -l)" -gt 0 ] && \
                ! docker compose -f infra/docker/compose.yml ps | grep -qiE 'starting|unhealthy'; do
            [ "$SECONDS" -ge "$deadline" ] && { echo "::error::stack did not become healthy in 120s"; docker compose -f infra/docker/compose.yml ps; exit 1; }
            sleep 3
          done
          docker compose -f infra/docker/compose.yml ps
      - name: tear down
        if: always()
        run: docker compose -f infra/docker/compose.yml down -v || true

  release-sign:
    name: Release — signing hook
    runs-on: ubuntu-latest
    needs: [rust-lint, rust-test]
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4
      - name: verify tag annotation
        run: |
          tag="${GITHUB_REF#refs/tags/}"
          echo "Preparing release for tag: $tag"
          git tag -v "$tag" 2>/dev/null || echo "::notice::Tag is not GPG-signed; add cosign/minisign step here."
      - name: placeholder — add release artifact signing here
        run: echo "::notice::Wire cosign/minisign artifact signing in this step."

  # ---------------------------------------------------------------------------
  # NOTE: leandropalazzo/opengeo-internal was renamed to anseo-internal (Story 45.6).
  # notify-internal — fire repository_dispatch to anseo-internal so the
  # auto-bump workflow picks up the new main commit within minutes rather than
  # waiting for the daily schedule.
  #
  # Requires: INTERNAL_DISPATCH_TOKEN secret in the opengeo repo — a PAT with
  # `repo` scope on leandropalazzo/anseo-internal.
  # If the secret is absent the step is silently skipped (continue-on-error).
  # Story 38.18 documents this as best-effort; the daily schedule covers the gap.
  # ---------------------------------------------------------------------------
  notify-internal:
    name: Dispatch bump trigger to anseo-internal
    runs-on: ubuntu-latest
    needs: [rust-test]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: repository_dispatch → anseo-internal (anseo-push)
        continue-on-error: true
        env:
          TOKEN: ${{ secrets.INTERNAL_DISPATCH_TOKEN }}
        run: |
          if [ -z "$TOKEN" ]; then
            echo "::notice::INTERNAL_DISPATCH_TOKEN not set — skipping dispatch (daily schedule covers the gap)."
            exit 0
          fi
          curl -f -s -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/leandropalazzo/anseo-internal/dispatches" \
            -d '{"event_type":"anseo-push","client_payload":{"sha":"${{ github.sha }}"}}'
          echo "Dispatched anseo-push event to anseo-internal."

  # G-SHRED sentinel scavenger (Story 44.2, CC-NFR1 / ACs 4–6). Sweeps Postgres,
  # ClickHouse, backups, logs, and CDN purge records for a known SENTINEL that
  # must NOT survive a KEK crypto-shred. This is an OPS verification tool meant
  # to run against a real staging environment (where ClickHouse/CDN/backups/
  # replicas actually exist) — it is therefore `workflow_dispatch`-ONLY and is
  # NOT part of the blocking ci-summary gate. The automated shred/resolution
  # correctness assertions for PR/push CI live in the Rust integration test
  # `crates/storage/tests/identified_contribution_pipeline.rs` (run by rust-test).
  # Promote this to a blocking gate once a seed→plant→shred→sweep harness +
  # staging stores are wired.
  g-shred-scavenger:
    name: G-SHRED — sentinel scavenger (manual/staging)
    runs-on: ubuntu-latest
    needs: paths-filter
    if: github.event_name == 'workflow_dispatch'
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: opengeo
          POSTGRES_PASSWORD: opengeo
          POSTGRES_DB: opengeo_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U opengeo"
          --health-interval 5s --health-timeout 5s --health-retries 10
    env:
      DATABASE_URL: postgres://opengeo:opengeo@localhost:5432/opengeo_test
      CI: "true"
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.95.0
      - uses: Swatinem/rust-cache@v2
      - name: install sqlx-cli
        uses: taiki-e/install-action@v2
        with:
          tool: sqlx-cli
      - name: apply migrations to the service DB
        # The fresh `postgres:` service starts empty. The scavenger's first query
        # reads `contributions`; without the schema it hits
        # `relation "contributions" does not exist` → inconclusive → fail-closed
        # (CI=true). Run the SAME embedded migrations the Rust tests use so a
        # manual workflow_dispatch run sweeps a clean (migrated, no-sentinel) DB.
        run: sqlx migrate run --source crates/storage/migrations
      - name: run sentinel scavenger (must find nothing post-shred)
        run: bash scripts/g-shred-scavenger.sh
      - name: upload scavenger report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: g-shred-report
          path: /tmp/g-shred-report.txt
          if-no-files-found: ignore

  ci-summary:
    name: CI summary
    runs-on: ubuntu-latest
    needs:
      [paths-filter, rust-lint, rust-test, rust-managed-pg, rust-coverage, web-lint-unit, web-e2e, compose-smoke]
    if: always()
    steps:
      - name: gate
        run: |
          echo "rust-lint:       ${{ needs.rust-lint.result }}"
          echo "rust-test:       ${{ needs.rust-test.result }}"
          echo "rust-managed-pg: ${{ needs.rust-managed-pg.result }}"
          echo "rust-coverage:   ${{ needs.rust-coverage.result }}"
          echo "web-lint-unit: ${{ needs.web-lint-unit.result }}"
          echo "web-e2e:       ${{ needs.web-e2e.result }}"
          echo "compose-smoke: ${{ needs.compose-smoke.result }}"
          # skipped (path-filtered / event-gated) is acceptable; only failure/cancelled fail the gate.
          for r in \
            "${{ needs.rust-lint.result }}" "${{ needs.rust-test.result }}" \
            "${{ needs.rust-managed-pg.result }}" \
            "${{ needs.rust-coverage.result }}" "${{ needs.web-lint-unit.result }}" \
            "${{ needs.web-e2e.result }}" "${{ needs.compose-smoke.result }}" \
            "${{ needs.g-shred-scavenger.result }}"; do
            if [[ "$r" == "failure" || "$r" == "cancelled" ]]; then
              echo "::error::A job failed or was cancelled."; exit 1
            fi
          done
          echo "CI gate: green (failed/cancelled = none; skipped = ok)."

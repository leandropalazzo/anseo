name: test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  CARGO_INCREMENTAL: 0

jobs:
  rust-lint:
    name: Rust — fmt + clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: cargo fmt --check
        run: cargo fmt --all --check
      - name: cargo clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

  rust-test:
    name: Rust — cargo test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: opengeo
          POSTGRES_PASSWORD: opengeo
          POSTGRES_DB: opengeo_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U opengeo -d opengeo_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgres://opengeo:opengeo@localhost:5432/opengeo_test
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: cargo test --workspace
        run: cargo test --workspace --locked

  compose-smoke:
    name: Smoke — Docker Compose 60s boot
    runs-on: ubuntu-latest
    needs: [rust-test]
    steps:
      - uses: actions/checkout@v4
      - name: docker compose up
        run: |
          if [ -f docker-compose.yml ]; then
            compose_file="docker-compose.yml"
          elif [ -f infra/docker/docker-compose.yml ]; then
            compose_file="infra/docker/docker-compose.yml"
          else
            echo "::warning::docker-compose.yml not present yet (Phase 1 deployment epic). Skipping smoke."
            exit 0
          fi
          docker compose -f "$compose_file" up -d
      - name: wait for healthy (≤60s)
        run: |
          if [ ! -f scripts/wait-healthy.sh ]; then
            echo "::warning::scripts/wait-healthy.sh not present yet. Skipping wait."
            exit 0
          fi
          bash scripts/wait-healthy.sh 60
      - name: tear down
        if: always()
        run: docker compose down -v || true

  ci-summary:
    name: CI summary
    runs-on: ubuntu-latest
    needs: [rust-lint, rust-test, compose-smoke]
    if: always()
    steps:
      - name: gate
        run: |
          echo "rust-lint:       ${{ needs.rust-lint.result }}"
          echo "rust-test:       ${{ needs.rust-test.result }}"
          echo "compose-smoke:   ${{ needs.compose-smoke.result }}"
          if [[ "${{ needs.rust-lint.result }}" != "success" || \
                "${{ needs.rust-test.result }}" != "success" ]]; then
            exit 1
          fi

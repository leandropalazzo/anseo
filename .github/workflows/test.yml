name: test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  CARGO_INCREMENTAL: 0
  # Force sqlx::query! macros to validate against the committed .sqlx/
  # offline cache instead of the live DATABASE_URL. The CI Postgres service
  # container is empty until #[sqlx::test] applies migrations into its own
  # ephemeral schema at runtime, so a compile-time live-DB check would
  # always fail with "relation does not exist".
  SQLX_OFFLINE: "true"

jobs:
  rust-lint:
    name: Rust — fmt + clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: install libdbus + pkg-config
        # Required by the `keyring` crate's Linux Secret Service backend,
        # pulled in transitively via opengeo-core.
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libdbus-1-dev pkg-config
      - uses: dtolnay/rust-toolchain@1.95.0
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: cargo fmt --check
        run: cargo fmt --all --check
      - name: cargo clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

  rust-test:
    name: Rust — cargo test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: opengeo
          POSTGRES_PASSWORD: opengeo
          POSTGRES_DB: opengeo_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U opengeo -d opengeo_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgres://opengeo:opengeo@localhost:5432/opengeo_test
    steps:
      - uses: actions/checkout@v4
      - name: install libdbus + pkg-config
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libdbus-1-dev pkg-config
      - uses: dtolnay/rust-toolchain@1.95.0
      - uses: Swatinem/rust-cache@v2
      - name: cargo test --workspace
        run: cargo test --workspace --locked

  rust-coverage:
    name: Rust — coverage
    runs-on: ubuntu-latest
    needs: rust-test
    if: github.event_name != 'pull_request'
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: opengeo
          POSTGRES_PASSWORD: opengeo
          POSTGRES_DB: opengeo_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U opengeo -d opengeo_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgres://opengeo:opengeo@localhost:5432/opengeo_test
    steps:
      - uses: actions/checkout@v4
      - name: free disk space
        # llvm-cov rebuilds the workspace with instrumentation and can overflow
        # the default runner disk. Keep this in the coverage-only job so normal
        # PR cargo-test feedback stays lean.
        run: |
          df -h /
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc \
            /opt/hostedtoolcache/CodeQL /usr/local/.ghcup /usr/share/swift
          sudo docker image prune --all --force || true
          df -h /
      - name: install libdbus + pkg-config
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libdbus-1-dev pkg-config
      - uses: dtolnay/rust-toolchain@1.95.0
        with:
          components: llvm-tools-preview
      - uses: Swatinem/rust-cache@v2
      - name: install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov
      - name: coverage
        run: bash scripts/coverage-rust.sh
      - name: upload rust coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: rust-coverage-lcov
          path: target/coverage/lcov.info
          retention-days: 30
          if-no-files-found: warn

  web-lint-unit:
    name: Web — lint + typecheck + vitest
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: apps/web/pnpm-lock.yaml
      - name: pnpm install
        run: pnpm install --frozen-lockfile
      - name: lint
        run: pnpm lint
      - name: typecheck
        run: pnpm typecheck
      - name: build
        run: pnpm build
      - name: vitest
        run: pnpm test
      - name: vitest coverage
        if: github.event_name != 'pull_request'
        run: pnpm test:coverage
      - name: upload web coverage
        if: always() && github.event_name != 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: web-coverage-lcov
          path: apps/web/coverage/lcov.info
          retention-days: 30
          if-no-files-found: warn

  web-e2e-smoke:
    name: Web — Playwright smoke (P0/P1)
    runs-on: ubuntu-latest
    needs: web-lint-unit
    if: github.event_name == 'pull_request'
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: apps/web/pnpm-lock.yaml
      - name: pnpm install
        run: pnpm install --frozen-lockfile
      - name: cache playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('apps/web/pnpm-lock.yaml') }}
      - name: install browsers
        run: pnpm exec playwright install --with-deps chromium
      - name: playwright P0/P1 smoke
        run: pnpm exec playwright test --grep "@P0|@P1"
      - name: upload trace artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-smoke
          path: apps/web/playwright-report
          retention-days: 14

  web-e2e-full:
    name: Web — Playwright full (E2E + axe)
    runs-on: ubuntu-latest
    needs: web-lint-unit
    if: github.event_name != 'pull_request'
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2]
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: apps/web/pnpm-lock.yaml
      - name: pnpm install
        run: pnpm install --frozen-lockfile
      - name: cache playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('apps/web/pnpm-lock.yaml') }}
      - name: install browsers
        run: pnpm exec playwright install --with-deps chromium
      - name: playwright shard ${{ matrix.shard }}/2
        run: pnpm exec playwright test --shard=${{ matrix.shard }}/2
      - name: upload trace artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-shard-${{ matrix.shard }}
          path: apps/web/playwright-report
          retention-days: 14

  compose-smoke:
    name: Compose — config + manual boot smoke
    runs-on: ubuntu-latest
    needs: [rust-test, web-lint-unit]
    steps:
      - uses: actions/checkout@v4
      - name: validate compose config
        id: validate
        run: |
          if [ -x infra/docker/validate-compose.sh ]; then
            bash infra/docker/validate-compose.sh
            echo "have_validator=true" >> "$GITHUB_OUTPUT"
          else
            echo "::warning::infra/docker/validate-compose.sh not present; skipping config validation."
            echo "have_validator=false" >> "$GITHUB_OUTPUT"
          fi
      - name: docker compose up
        id: compose
        if: github.event_name == 'workflow_dispatch'
        timeout-minutes: 6
        run: |
          if [ -f infra/docker/compose.yml ]; then
            compose_file="infra/docker/compose.yml"
          elif [ -f infra/docker/docker-compose.yml ]; then
            compose_file="infra/docker/docker-compose.yml"
          elif [ -f docker-compose.yml ]; then
            compose_file="docker-compose.yml"
          else
            echo "::warning::compose file not present yet (Phase 1 deployment epic). Skipping smoke."
            echo "started=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          docker compose -f "$compose_file" up -d
          echo "compose_file=$compose_file" >> "$GITHUB_OUTPUT"
          echo "started=true" >> "$GITHUB_OUTPUT"
      - name: wait for healthy (≤90s)
        if: steps.compose.outputs.started == 'true'
        run: |
          if [ ! -f scripts/wait-healthy.sh ]; then
            echo "::warning::scripts/wait-healthy.sh not present yet. Skipping wait."
            exit 0
          fi
          # 90s (was 60s): the web healthcheck probes SSR `/`, which on its
          # first render does ~6 live-API round-trips for the dashboard's live
          # data — that cold warmup lands just past 60s on CI runners even
          # though every container is up well under 60s. The page itself is
          # fine (200); this only covers first-render latency.
          bash scripts/wait-healthy.sh 90
      - name: dump web diagnostics on failure
        # The web container's healthcheck is `wget /`, so when the stack never
        # goes healthy it's almost always SSR on `/` failing. Surface the web
        # (and api) logs plus a real probe before tear-down wipes everything.
        if: failure() && steps.compose.outputs.started == 'true'
        run: |
          cf="${{ steps.compose.outputs.compose_file }}"
          echo "===== docker compose ps ====="
          docker compose -f "$cf" ps || true
          echo "===== web logs (tail 200) ====="
          docker compose -f "$cf" logs --no-color --tail=200 web || true
          echo "===== api logs (tail 80) ====="
          docker compose -f "$cf" logs --no-color --tail=80 api || true
          echo "===== probe / from the host ====="
          curl -sS -m 15 -i http://127.0.0.1:5173/ 2>&1 | head -40 || echo "host curl / failed/timed out"
          echo "===== probe / from inside the web container ====="
          docker compose -f "$cf" exec -T web wget -S -T 15 -O- http://127.0.0.1:5173/ 2>&1 | head -60 || echo "in-container wget / failed/timed out"
      - name: assert localhost-only bindings (NFR-14)
        if: steps.compose.outputs.started == 'true'
        # Asserts every published container port is bound to 127.0.0.1 from
        # the host's perspective — i.e. nothing is reachable on 0.0.0.0 by
        # default. The {{.HostIp}} placeholder in the format string comes
        # from Go template syntax used by `docker inspect`, not GitHub
        # Actions expressions.
        run: |
          set -euo pipefail
          containers=$(docker compose -f "${{ steps.compose.outputs.compose_file }}" ps -q)
          if [ -z "$containers" ]; then
            echo "::error::no running containers to inspect"
            exit 1
          fi
          violations=0
          for c in $containers; do
            name=$(docker inspect -f '{{.Name}}' "$c" | sed 's|^/||')
            # `docker inspect -f '{{json .NetworkSettings.Ports}}'` returns
            # {"8080/tcp": [{"HostIp": "127.0.0.1", "HostPort": "8080"}], ...}
            # — any HostIp other than 127.0.0.1 (or empty for IPv6 wildcard) violates NFR-14.
            non_localhost=$(docker inspect -f '{{json .NetworkSettings.Ports}}' "$c" \
              | tr ',' '\n' \
              | grep -oE '"HostIp":"[^"]*"' \
              | grep -v '"HostIp":"127.0.0.1"' \
              | grep -v '"HostIp":"::1"' \
              | grep -v '"HostIp":""' || true)
            if [ -n "$non_localhost" ]; then
              echo "::error::container $name has non-localhost bindings: $non_localhost"
              violations=$((violations+1))
            fi
          done
          if [ "$violations" -gt 0 ]; then
            echo "::error::NFR-14 violated: $violations container(s) bind to non-localhost host IPs"
            exit 1
          fi
          echo "✅ NFR-14: every published port is bound to 127.0.0.1"
      - name: tear down
        if: always() && steps.compose.outputs.started == 'true'
        run: docker compose -f "${{ steps.compose.outputs.compose_file }}" down -v || true

  ci-summary:
    name: CI summary
    runs-on: ubuntu-latest
    needs:
      [
        rust-lint,
        rust-test,
        rust-coverage,
        web-lint-unit,
        web-e2e-smoke,
        web-e2e-full,
        compose-smoke,
      ]
    if: always()
    steps:
      - name: gate
        run: |
          echo "rust-lint:       ${{ needs.rust-lint.result }}"
          echo "rust-test:       ${{ needs.rust-test.result }}"
          echo "rust-coverage:   ${{ needs.rust-coverage.result }}"
          echo "web-lint-unit:   ${{ needs.web-lint-unit.result }}"
          echo "web-e2e-smoke:   ${{ needs.web-e2e-smoke.result }}"
          echo "web-e2e-full:    ${{ needs.web-e2e-full.result }}"
          echo "compose-smoke:   ${{ needs.compose-smoke.result }}"
          if [[ "${{ needs.rust-lint.result }}" != "success" || \
                "${{ needs.rust-test.result }}" != "success" || \
                "${{ needs.web-lint-unit.result }}" != "success" ]]; then
            exit 1
          fi
          if [[ "${{ needs.rust-coverage.result }}" == "failure" || \
                "${{ needs.rust-coverage.result }}" == "cancelled" || \
                "${{ needs.web-e2e-smoke.result }}" == "failure" || \
                "${{ needs.web-e2e-smoke.result }}" == "cancelled" || \
                "${{ needs.web-e2e-full.result }}" == "failure" || \
                "${{ needs.web-e2e-full.result }}" == "cancelled" || \
                "${{ needs.compose-smoke.result }}" == "failure" || \
                "${{ needs.compose-smoke.result }}" == "cancelled" ]]; then
            exit 1
          fi

name: test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  CARGO_INCREMENTAL: 0
  # Force sqlx::query! macros to validate against the committed .sqlx/
  # offline cache instead of the live DATABASE_URL. The CI Postgres service
  # container is empty until #[sqlx::test] applies migrations into its own
  # ephemeral schema at runtime, so a compile-time live-DB check would
  # always fail with "relation does not exist".
  SQLX_OFFLINE: "true"

jobs:
  rust-lint:
    name: Rust — fmt + clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: install libdbus + pkg-config
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libdbus-1-dev pkg-config
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: cargo fmt --check
        run: cargo fmt --all --check
      - name: cargo clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

  rust-test:
    name: Rust — cargo test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: opengeo
          POSTGRES_PASSWORD: opengeo
          POSTGRES_DB: opengeo_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U opengeo -d opengeo_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgres://opengeo:opengeo@localhost:5432/opengeo_test
    steps:
      - uses: actions/checkout@v4
      - name: install libdbus + pkg-config
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libdbus-1-dev pkg-config
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: cargo test --workspace
        run: cargo test --workspace --locked

  # NOTE: no compose-smoke job here. The public opengeo repo is Rust-only —
  # `apps/web/` is intentionally excluded by scripts/publish-public.sh, so
  # `compose.yml`'s `web` service can't be built. The full-stack smoke
  # (postgres + redis + api + web) is exercised by the monorepo's CI at
  # github.com/leandropalazzo/opengeo-workspace.
  ci-summary:
    name: CI summary
    runs-on: ubuntu-latest
    needs: [rust-lint, rust-test]
    if: always()
    steps:
      - name: gate
        run: |
          echo "rust-lint:       ${{ needs.rust-lint.result }}"
          echo "rust-test:       ${{ needs.rust-test.result }}"
          if [[ "${{ needs.rust-lint.result }}" != "success" || \
                "${{ needs.rust-test.result }}" != "success" ]]; then
            exit 1
          fi

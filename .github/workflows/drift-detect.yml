# =============================================================================
# DRIFT DETECTION (Story 38.20)
#
# Daily scheduled check that alerts when any repo drifts behind its source of
# truth. Raises a GitHub issue labelled `drift` when a gap is found; closes it
# automatically when the drift resolves. Produces no noise when everything is
# current.
#
# ── CHECKS ──────────────────────────────────────────────────────────────────
#   (A) anseo-internal submodule pin > N commits behind anseo main.
#   (B) Marketing/docs site last built against an OSS tag older than the latest
#       anseo release tag.
#   (C) Published standalone compose.yml pins image tags older than the latest
#       GHCR release.
#
# ── ALERT MECHANISM ─────────────────────────────────────────────────────────
#   * Open:  `gh issue create` labelled `drift` (idempotent: skips if an open
#            drift issue with the same title already exists).
#   * Close: find open drift issues whose title matches; close + comment.
#   * Requires GITHUB_TOKEN with issues: write (default in public repos on the
#     owner account).
#
# ── CONSTANTS ───────────────────────────────────────────────────────────────
#   SUBMODULE_LAG_THRESHOLD: 5 commits (alert if pin > 5 behind main)
# =============================================================================

name: Drift Detection

on:
  schedule:
    # 07:00 UTC daily — after nightly bumps (38.18/38.19) have had time to run.
    - cron: "0 7 * * *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry-run: print findings but do not open/close issues"
        type: boolean
        default: false

permissions:
  contents: read
  issues: write

env:
  SUBMODULE_LAG_THRESHOLD: "5"
  GHCR_API: "https://ghcr.io/v2/leandropalazzo"

jobs:
  drift-check:
    name: Check repo drift
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: false
          persist-credentials: false

      - name: Fetch anseo-internal submodule commits (if token available)
        id: submodule
        env:
          INTERNAL_DISPATCH_TOKEN: ${{ secrets.INTERNAL_DISPATCH_TOKEN }}
        run: |
          set -euo pipefail

          # Read pinned submodule SHA from .gitmodules / git tree
          PINNED_SHA=$(git ls-tree HEAD -- anseo-internal 2>/dev/null \
            | awk '{print $3}' || echo "")

          if [[ -z "$PINNED_SHA" ]]; then
            echo "no_submodule=true" >> "$GITHUB_OUTPUT"
            echo "::notice::No anseo-internal submodule found — skipping submodule drift check."
            exit 0
          fi
          echo "no_submodule=false" >> "$GITHUB_OUTPUT"
          echo "pinned_sha=$PINNED_SHA" >> "$GITHUB_OUTPUT"

          if [[ -z "${INTERNAL_DISPATCH_TOKEN:-}" ]]; then
            echo "lag=0" >> "$GITHUB_OUTPUT"
            echo "::notice::INTERNAL_DISPATCH_TOKEN not set — cannot check anseo-internal lag; skipping."
            exit 0
          fi

          # Count commits on anseo-internal main ahead of the pinned SHA
          INTERNAL_MAIN=$(curl -fsSL \
            -H "Authorization: Bearer $INTERNAL_DISPATCH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/leandropalazzo/anseo-internal/commits?sha=main&per_page=1" \
            | python3 -c "import json,sys; c=json.load(sys.stdin); print(c[0]['sha'] if c else '')")

          if [[ -z "$INTERNAL_MAIN" ]]; then
            echo "lag=0" >> "$GITHUB_OUTPUT"
            echo "::notice::Could not read anseo-internal main HEAD — skipping submodule lag check."
            exit 0
          fi

          # Fetch compare between pinned SHA and current main
          COMPARE=$(curl -fsSL \
            -H "Authorization: Bearer $INTERNAL_DISPATCH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/leandropalazzo/anseo-internal/compare/${PINNED_SHA}...${INTERNAL_MAIN}" \
            | python3 -c "import json,sys; d=json.load(sys.stdin); print(d.get('ahead_by',0))")

          echo "lag=${COMPARE}" >> "$GITHUB_OUTPUT"
          echo "internal_main=$INTERNAL_MAIN" >> "$GITHUB_OUTPUT"
          echo "::notice::anseo-internal lag: ${COMPARE} commits behind main."

      - name: Check latest anseo release tag
        id: release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          LATEST=$(gh api repos/leandropalazzo/anseo/releases/latest \
            --jq '.tag_name' 2>/dev/null || echo "")
          echo "latest_tag=${LATEST}" >> "$GITHUB_OUTPUT"
          echo "::notice::Latest anseo release: ${LATEST:-none}"

      - name: Check docs/marketing site build tag
        id: docs
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          LATEST="${{ steps.release.outputs.latest_tag }}"

          if [[ -z "$LATEST" ]]; then
            echo "docs_ok=true" >> "$GITHUB_OUTPUT"
            echo "::notice::No release tag found — skipping docs drift check."
            exit 0
          fi

          # Check the last successful docs-site workflow run and the tag it used.
          # The docs-site rebuild dispatch (38.21) puts the OSS tag in the run name.
          LAST_DOCS_TAG=$(gh api \
            "repos/leandropalazzo/anseo-web/actions/workflows/build.yml/runs?status=success&per_page=1" \
            --jq '.workflow_runs[0].head_branch // ""' 2>/dev/null || echo "")

          # If anseo-web uses a different workflow name, try a broader search
          if [[ -z "$LAST_DOCS_TAG" ]]; then
            LAST_DOCS_TAG=$(gh api \
              "repos/leandropalazzo/anseo-web/actions/runs?status=success&per_page=5" \
              --jq '[.workflow_runs[] | select(.name | test("deploy|build|publish"; "i")) | .head_branch][0] // ""' \
              2>/dev/null || echo "")
          fi

          if [[ -z "$LAST_DOCS_TAG" || "$LAST_DOCS_TAG" == "$LATEST" ]]; then
            echo "docs_ok=true" >> "$GITHUB_OUTPUT"
            echo "docs_tag=${LAST_DOCS_TAG}" >> "$GITHUB_OUTPUT"
          else
            echo "docs_ok=false" >> "$GITHUB_OUTPUT"
            echo "docs_tag=${LAST_DOCS_TAG}" >> "$GITHUB_OUTPUT"
          fi
          echo "::notice::Docs site last build tag: ${LAST_DOCS_TAG:-unknown}; current release: ${LATEST}."

      - name: Check standalone compose.yml image tags
        id: compose
        run: |
          set -euo pipefail
          LATEST="${{ steps.release.outputs.latest_tag }}"
          BARE="${LATEST#v}"   # strip leading v

          if [[ -z "$BARE" ]]; then
            echo "compose_ok=true" >> "$GITHUB_OUTPUT"
            echo "::notice::No release tag — skipping compose drift check."
            exit 0
          fi

          # Read the compose.yml from the repo (infra/standalone/compose.yml)
          # and grep for pinned image tags.
          if [[ ! -f "infra/standalone/compose.yml" ]]; then
            echo "compose_ok=true" >> "$GITHUB_OUTPUT"
            echo "::notice::infra/standalone/compose.yml not found — skipping compose drift check."
            exit 0
          fi

          # Collect all ghcr image tags in the compose file
          COMPOSE_TAGS=$(grep -oP 'ghcr\.io/[^:]+:\K[^\s"]+' infra/standalone/compose.yml \
            | grep -v '^$' | sort -u || true)

          STALE=0
          STALE_LIST=""
          while IFS= read -r tag; do
            if [[ "$tag" != "$BARE" && "$tag" != "latest" ]]; then
              STALE=$((STALE + 1))
              STALE_LIST="${STALE_LIST} ${tag}"
            fi
          done <<< "$COMPOSE_TAGS"

          if [[ "$STALE" -eq 0 ]]; then
            echo "compose_ok=true" >> "$GITHUB_OUTPUT"
          else
            echo "compose_ok=false" >> "$GITHUB_OUTPUT"
            echo "stale_tags=${STALE_LIST}" >> "$GITHUB_OUTPUT"
            echo "::notice::Compose stale tags:${STALE_LIST} (want ${BARE})."
          fi

      - name: Evaluate drift and open/close issues
        env:
          GH_TOKEN: ${{ github.token }}
          DRY_RUN: ${{ inputs.dry_run || 'false' }}
        run: |
          set -euo pipefail

          LATEST="${{ steps.release.outputs.latest_tag }}"
          THRESHOLD="${SUBMODULE_LAG_THRESHOLD}"
          DRIFTS=()

          # --- Submodule lag check ---
          NO_SUB="${{ steps.submodule.outputs.no_submodule }}"
          LAG="${{ steps.submodule.outputs.lag }}"
          PINNED="${{ steps.submodule.outputs.pinned_sha }}"
          INTERNAL_MAIN="${{ steps.submodule.outputs.internal_main }}"

          if [[ "$NO_SUB" != "true" && -n "$LAG" && "$LAG" -gt "$THRESHOLD" ]]; then
            DRIFTS+=("submodule-lag: anseo-internal pin (${PINNED:0:7}) is ${LAG} commits behind main (${INTERNAL_MAIN:0:7})")
          fi

          # --- Docs drift check ---
          DOCS_OK="${{ steps.docs.outputs.docs_ok }}"
          DOCS_TAG="${{ steps.docs.outputs.docs_tag }}"
          if [[ "$DOCS_OK" == "false" ]]; then
            DRIFTS+=("docs-drift: marketing/docs site last built against '${DOCS_TAG}', current release is '${LATEST}'")
          fi

          # --- Compose drift check ---
          COMPOSE_OK="${{ steps.compose.outputs.compose_ok }}"
          STALE_TAGS="${{ steps.compose.outputs.stale_tags }}"
          if [[ "$COMPOSE_OK" == "false" ]]; then
            DRIFTS+=("compose-drift: standalone compose.yml has stale image tags:${STALE_TAGS} (want ${LATEST#v})")
          fi

          if [[ "${#DRIFTS[@]}" -gt 0 ]]; then
            BODY="## Repo drift detected $(date -u +%Y-%m-%d)

          The following drift was detected in the anseo repository topology:

          $(printf -- '- %s\n' "${DRIFTS[@]}")

          **Action required:** run the relevant bump automation (38.18/38.19) or resolve manually.
          This issue closes automatically when the next drift-detect run finds no gaps."

            TITLE="[drift] Repo topology staleness $(date -u +%Y-%m-%d)"

            # Check if an open drift issue already exists today (idempotent)
            EXISTING=$(gh issue list \
              --repo "$GITHUB_REPOSITORY" \
              --label drift \
              --state open \
              --json number,title \
              --jq '.[0].number // ""' 2>/dev/null || echo "")

            if [[ "$DRY_RUN" == "true" ]]; then
              echo "DRY-RUN: would open drift issue:"
              echo "$BODY"
            elif [[ -z "$EXISTING" ]]; then
              gh issue create \
                --repo "$GITHUB_REPOSITORY" \
                --title "$TITLE" \
                --body "$BODY" \
                --label drift
              echo "::warning::Drift issue opened."
            else
              gh issue comment "$EXISTING" \
                --repo "$GITHUB_REPOSITORY" \
                --body "$BODY"
              echo "::warning::Updated existing drift issue #${EXISTING}."
            fi

          else
            echo "No drift detected — all repos current."

            # Close any open drift issue
            OPEN=$(gh issue list \
              --repo "$GITHUB_REPOSITORY" \
              --label drift \
              --state open \
              --json number \
              --jq '.[].number' 2>/dev/null || echo "")

            if [[ -n "$OPEN" ]]; then
              while IFS= read -r num; do
                if [[ "$DRY_RUN" == "true" ]]; then
                  echo "DRY-RUN: would close drift issue #${num}"
                else
                  gh issue close "$num" \
                    --repo "$GITHUB_REPOSITORY" \
                    --comment "Drift resolved — no gaps detected as of $(date -u +%Y-%m-%d). Closing automatically."
                fi
              done <<< "$OPEN"
            fi
          fi

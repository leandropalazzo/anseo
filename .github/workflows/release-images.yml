# =============================================================================
# RELEASE-IMAGES (reusable) — build & publish multi-arch GHCR images.
#
# This is the SINGLE source of the image-build/publish logic (Story 38.15),
# factored out of the former standalone release.yml into a `workflow_call`
# reusable workflow so the release-train (Story 38.19) can fan it out without
# duplicating it. There is exactly ONE place that publishes the images, so a
# version tag can never trigger a double-publish.
#
# CALLED BY:
#   * .github/workflows/release.yml — the release-train orchestrator, on a
#     vX.Y.Z tag (or workflow_dispatch). This is the production entry point and
#     the ONLY path that can publish official image tags to GHCR. It sets
#     push=true ONLY after its tag/reachability guard (publish_ok) passes.
#   * workflow_dispatch (below)     — BUILD-ONLY validation of a single ref for
#     operators. A DIRECT manual dispatch can NEVER publish to GHCR or move
#     `latest`, regardless of any dispatch-supplied input: the build step's
#     effective push/tag_latest are forced false unless the run arrived via
#     `workflow_call` from the guarded release train. This closes the
#     supply-chain hole where a direct dispatch of an arbitrary/unproven ref
#     (e.g. v9.9.9) could push official ghcr.io/.../opengeo/{api,worker,web}
#     tags while bypassing the release train's tag/reachability validation.
#     To actually publish, run the release train (push a vX.Y.Z tag / dispatch
#     release.yml) — it gates publish on its own ref guard before calling here.
#
# IMAGE TAGS (docker/metadata-action, semver flavour):
#   git tag v1.2.3  → 1.2.3, 1.2, 1   (+ `latest` only on the default branch)
# Note the leading `v` is STRIPPED ({{version}} → 1.2.3), which is what the
# standalone bundle's ANSEO_VERSION (X.Y.Z, no v) and compose pins expect.
#
# This workflow has NO `pull_request` / `push:branches` trigger, so it is never
# a blocking PR check.
# =============================================================================

name: release-images

on:
  workflow_call:
    inputs:
      ref:
        description: "Git ref / tag to build from (e.g. v1.2.3). Defaults to the caller's ref."
        required: false
        type: string
      push:
        description: "Publish images + attestations to GHCR. false = dry-run build only (no registry mutation)."
        required: false
        default: true
        type: boolean
      tag_latest:
        description: >-
          Move the `latest` tag to THIS build. Must be true ONLY for a normal
          top-of-tree tag-push release. Defaults to false so a manual republish
          or a rebuild of an OLD tag never overwrites `latest` with a stale image.
        required: false
        default: false
        type: boolean
    outputs:
      version:
        description: "The resolved X.Y.Z version (leading v stripped) the images were published under."
        value: ${{ jobs.build-and-push.outputs.version }}
  # DIRECT manual dispatch is BUILD-ONLY: it validates that the given ref builds
  # for both arches but can never push to GHCR or move `latest` (see the build
  # job's effective-push gate below). There is intentionally no `push`/
  # `tag_latest` input here — a direct dispatch must not be able to request a
  # publish from an unproven ref. Publishing goes through the release train,
  # which calls this workflow via `workflow_call` after its ref guard passes.
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref / tag to build for validation (e.g. v1.2.3). BUILD-ONLY — never pushes to GHCR."
        required: true
        type: string

permissions:
  contents: read
  packages: write
  attestations: write
  id-token: write

jobs:
  build-and-push:
    name: Build & push — ${{ matrix.app }}
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    strategy:
      fail-fast: false
      matrix:
        app: [api, worker, web]

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.ref }}

      # Resolve the bare X.Y.Z version (strip refs/tags/ and a leading v) so the
      # train can pin the standalone snapshot to the same string the images use.
      - name: Resolve version
        id: version
        env:
          INPUT_REF: ${{ inputs.ref }}
          GH_REF: ${{ github.ref }}
        run: |
          set -euo pipefail
          raw="${INPUT_REF:-$GH_REF}"
          raw="${raw#refs/tags/}"
          raw="${raw#refs/heads/}"
          ver="${raw#v}"
          echo "version=${ver}" >> "$GITHUB_OUTPUT"
          echo "resolved version: ${ver}"

      # SUPPLY-CHAIN GUARD: compute the EFFECTIVE publish flags. Publishing to
      # GHCR (and moving `latest`) is allowed ONLY when this workflow was invoked
      # via `workflow_call` from the guarded release train — and even then only
      # when the caller explicitly requested it. A DIRECT `workflow_dispatch`
      # resolves both flags to false no matter what, so a manual run of an
      # arbitrary/unproven ref (e.g. v9.9.9) can only validate the build; it can
      # never mutate the registry or overwrite `latest`. This is what prevents a
      # direct dispatch from bypassing the release train's tag/reachability guard.
      - name: Resolve effective publish flags
        id: flags
        env:
          EVENT_NAME: ${{ github.event_name }}
          CALLER_PUSH: ${{ inputs.push }}
          CALLER_TAG_LATEST: ${{ inputs.tag_latest }}
        run: |
          set -euo pipefail
          if [ "${EVENT_NAME}" = "workflow_call" ]; then
            push="${CALLER_PUSH:-false}"
            tag_latest="${CALLER_TAG_LATEST:-false}"
          else
            # Direct workflow_dispatch (or any non-call trigger): build-only.
            push="false"
            tag_latest="false"
          fi
          echo "push=${push}" >> "$GITHUB_OUTPUT"
          echo "tag_latest=${tag_latest}" >> "$GITHUB_OUTPUT"
          echo "effective push=${push} tag_latest=${tag_latest} (event=${EVENT_NAME})"

      # Multi-arch emulation (arm64 via QEMU)
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      # Extended Buildx with multi-platform support
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Authenticate to GHCR using the built-in GITHUB_TOKEN — no PAT required
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Generate canonical image tags from the RESOLVED version (steps.version),
      # NOT the workflow event ref. On workflow_dispatch github.ref is the
      # selected BRANCH, so semver rules keyed off the event ref would emit no
      # X.Y.Z/X.Y/X tags; passing `value=v<X.Y.Z>` makes the semver patterns
      # derive from the resolved version on BOTH the tag-push and dispatch paths.
      # The leading `v` is re-applied here only so docker/metadata-action's semver
      # parser sees a tag-shaped value; {{version}}/{{major}}/{{minor}} strip it
      # back to the bare X.Y.Z that ANSEO_VERSION + the compose snapshot expect.
      #
      # `latest` is gated on the explicit `tag_latest` INPUT — i.e. the RESOLVED
      # build ref, decided by the caller — NOT on docker/metadata-action's
      # {{is_default_branch}}, which reads the workflow EVENT ref. {{is_default_branch}}
      # is true for ANY run dispatched from the default branch (incl. a manual
      # republish with `ref: <old tag>`), so it would let a rerun overwrite
      # `latest` with an arbitrary/old release. release.yml passes tag_latest=true
      # ONLY on the normal top-of-tree tag-push path; manual republish / dry-run /
      # old-tag rebuilds leave it false, so `latest` never moves to a stale image.
      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/opengeo/${{ matrix.app }}
          tags: |
            type=semver,pattern={{version}},value=v${{ steps.version.outputs.version }}
            type=semver,pattern={{major}}.{{minor}},value=v${{ steps.version.outputs.version }}
            type=semver,pattern={{major}},value=v${{ steps.version.outputs.version }}
            type=raw,value=latest,enable=${{ steps.flags.outputs.tag_latest }}

      # Build for amd64 + arm64 and push both manifests atomically
      - name: Build and push
        id: push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/${{ matrix.app }}/Dockerfile
          platforms: linux/amd64,linux/arm64
          # Dry-run (push=false) builds both arches for validation but does NOT
          # push manifests/tags to GHCR — no registry mutation on a rehearsal.
          # Effective push (steps.flags) is false for a direct workflow_dispatch,
          # so a manual run is always build-only; true only when the guarded
          # release train calls in via workflow_call with push=true.
          push: ${{ steps.flags.outputs.push == 'true' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.app }}
          cache-to: type=gha,mode=max,scope=${{ matrix.app }}

      # Emit SLSA Level-2 build provenance attestation. Skipped on a dry-run
      # (push=false): with no pushed image there is no digest to attest, and
      # push-to-registry would mutate GHCR — exactly what a rehearsal avoids.
      - name: Attest build provenance
        if: ${{ steps.flags.outputs.push == 'true' }}
        uses: actions/attest-build-provenance@v1
        with:
          subject-name: ghcr.io/${{ github.repository_owner }}/opengeo/${{ matrix.app }}
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true

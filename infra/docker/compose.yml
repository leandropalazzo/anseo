# OpenGEO Phase 1 — local Docker Compose stack
#
# Brings up the Phase 1 services for local development and the FR-22 release-gate
# smoke test. App images (api / worker / web) are placeholders until the
# corresponding Phase 1 stories build them; healthcheck placeholders are intentional
# (Epic 1 Story 1.4 AC).
#
# All host-port bindings use 127.0.0.1 to keep the stack localhost-only by default
# (Story 1.4 AC: "Dashboard and API bindings are localhost-only by default").
# Override via ANSEO_BIND_HOST for non-default deployments.

name: anseo

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-anseo}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-anseo}
      POSTGRES_DB: ${POSTGRES_DB:-anseo}
    ports:
      - "${ANSEO_BIND_HOST:-127.0.0.1}:${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-anseo} -d ${POSTGRES_DB:-anseo}"]
      interval: 2s
      timeout: 3s
      retries: 15
      start_period: 5s

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "${ANSEO_BIND_HOST:-127.0.0.1}:${REDIS_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 3s
      retries: 15
      start_period: 3s

  api:
    # Story 4.5: real Axum API. Override ANSEO_API_IMAGE to use a published
    # image; default `build:` produces a local image from apps/api/Dockerfile.
    build:
      context: ../..
      dockerfile: apps/api/Dockerfile
    image: ${ANSEO_API_IMAGE:-anseo/api:dev}
    restart: unless-stopped
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-anseo}:${POSTGRES_PASSWORD:-anseo}@postgres:5432/${POSTGRES_DB:-anseo}
      REDIS_URL: redis://redis:6379
      ANSEO_BIND_ADDR: 0.0.0.0:8080
      # The api binds 0.0.0.0 so the sibling `web` container can reach it at
      # api:8080 over the private compose bridge (host ports stay 127.0.0.1
      # only — see NFR-14). A non-loopback bind requires ≥1 active API key
      # (NFR-AuthHardenedByDefault); seed one on first boot via this key so the
      # stack comes up without a manual `ogeo api key create`. This default is
      # a well-known DEV credential — override ANSEO_BOOTSTRAP_API_KEY for any
      # non-local deployment. Must match the `ogeo_<32 base62>` wire shape.
      ANSEO_BOOTSTRAP_API_KEY: ${ANSEO_BOOTSTRAP_API_KEY:-ogeo_DevComposeBootstrapKeyDoNotUse01}
      RUST_LOG: ${RUST_LOG:-info}
      # Path to anseo.yaml inside the container. The API derives its
      # project_id from this file's brand.name (Story 2.1's stable-ID hash),
      # so it must match the YAML the CLI used when seeding data.
      ANSEO_CONFIG: /anseo.yaml
      # Provider API keys set via the dashboard (POST /v1/setup/api-keys/:provider)
      # are persisted through opengeo_core's secret-store chain. The OS keyring
      # is unavailable in a headless container, so the durable leg is the
      # age-encrypted secrets file — which requires a passphrase. Without it the
      # chain silently falls through to an ephemeral in-memory store and keys
      # vanish between requests. This is a well-known DEV passphrase; override
      # ANSEO_KEYRING_PASSPHRASE for any non-local deployment.
      ANSEO_KEYRING_PASSPHRASE: ${ANSEO_KEYRING_PASSPHRASE:-dev-compose-secrets-passphrase}
      # Headless container: no OS keychain. The keyring crate's secret-service
      # backend blocks trying to reach a non-existent D-Bus daemon, stalling
      # every secret get/set until the 1s probe timeout fires (which made
      # dashboard-set keys read back as "not configured"). Skip the keyring leg
      # so the chain uses the durable age-file directly.
      ANSEO_DISABLE_KEYRING: "1"
      # Pin the age secrets file under a named volume so dashboard-set keys
      # survive `docker compose up --build` recreations.
      XDG_CONFIG_HOME: /data/config
    volumes:
      # Mount the project's anseo.yaml read-only so api + future cli sidecars
      # see the same canonical declaration. Path is overridable via the
      # ANSEO_PROJECT_CONFIG env var on the host; default points at the
      # screenshot/demo fixture.
      - ${ANSEO_PROJECT_CONFIG:-./fixture-anseo.yaml}:/anseo.yaml:ro
      # Durable home for the age-encrypted provider-secrets file
      # (<XDG_CONFIG_HOME>/opengeo/secrets.age).
      - api-secrets:/data/config
    ports:
      - "${ANSEO_BIND_HOST:-127.0.0.1}:${ANSEO_API_PORT:-8080}:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      # /healthz is auth-gated (monitoring must prove auth works), so the probe
      # carries the same key the api seeds. `$$` escapes compose interpolation
      # so the container shell expands its own ANSEO_BOOTSTRAP_API_KEY at
      # runtime — stays correct even when the operator overrides the key.
      test: ["CMD-SHELL", "wget -q -O- --header=\"X-Anseo-API-Key: $$ANSEO_BOOTSTRAP_API_KEY\" http://127.0.0.1:8080/healthz || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 10s

  worker:
    # Real background worker: polls due schedule ticks, runs the prompt ×
    # provider matrix through the orchestrator, and drives webhook + ETL sweeps.
    # Override ANSEO_WORKER_IMAGE to use a published image; default `build:`
    # produces a local image from apps/worker/Dockerfile.
    build:
      context: ../..
      dockerfile: apps/worker/Dockerfile
    image: ${ANSEO_WORKER_IMAGE:-anseo/worker:dev}
    restart: unless-stopped
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-anseo}:${POSTGRES_PASSWORD:-anseo}@postgres:5432/${POSTGRES_DB:-anseo}
      REDIS_URL: redis://redis:6379
      RUST_LOG: ${RUST_LOG:-info}
      # Same canonical config the api derives its project_id from — the worker
      # overlays the DB-authoritative brand row on top before dispatching ticks.
      ANSEO_CONFIG: /anseo.yaml
      # Provider keys live in the shared age-secrets file (api-secrets volume).
      # Mirror the api's keyring env so build_real_registry reads the same keys
      # the dashboard persisted: passphrase unlocks the age file; the keyring
      # leg is skipped (no D-Bus in a headless container); XDG_CONFIG_HOME points
      # the secret-store chain at the mounted volume.
      ANSEO_KEYRING_PASSPHRASE: ${ANSEO_KEYRING_PASSPHRASE:-dev-compose-secrets-passphrase}
      ANSEO_DISABLE_KEYRING: "1"
      XDG_CONFIG_HOME: /data/config
    volumes:
      # Same opengeo.yaml the api mounts (read-only).
      - ${ANSEO_PROJECT_CONFIG:-./fixture-anseo.yaml}:/anseo.yaml:ro
      # Shared age-secrets home so the worker reads dashboard-set provider keys.
      - api-secrets:/data/config
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  web:
    # Story 4.1 + 4.5: Next.js dashboard. Override ANSEO_WEB_IMAGE to use a
    # published image; default `build:` produces a local image from apps/web.
    build:
      context: ../..
      dockerfile: apps/web/Dockerfile
    image: ${ANSEO_WEB_IMAGE:-anseo/web:dev}
    restart: unless-stopped
    environment:
      ANSEO_API_BASE_URL: http://api:8080
      # Authenticate SSR fetches to the api with the same bootstrap key the
      # api seeds (default is the shared dev credential above; override both
      # via ANSEO_BOOTSTRAP_API_KEY to keep them in lockstep).
      ANSEO_API_KEY: ${ANSEO_BOOTSTRAP_API_KEY:-ogeo_DevComposeBootstrapKeyDoNotUse01}
    ports:
      - "${ANSEO_BIND_HOST:-127.0.0.1}:${ANSEO_WEB_PORT:-5173}:5173"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:5173 || exit 1"]
      interval: 10s
      # 20s: the probe hits SSR `/`, which on every render (cache: no-store)
      # makes ~7 live-API round-trips for the dashboard and measures 5–15s on
      # CI runners. A shorter timeout kills each probe mid-render, so the
      # container never reports healthy even though `/` ultimately returns 200.
      timeout: 20s
      retries: 12
      start_period: 30s

volumes:
  postgres-data:
  redis-data:
  api-secrets:

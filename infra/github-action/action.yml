name: "Anseo CI Gate"
description: "Run an Anseo visibility or site-audit gate inside CI."
author: "Anseo"
branding:
  icon: "trending-up"
  color: "purple"

inputs:
  mode:
    description: "Gate to run: visibility or audit."
    required: false
    default: "visibility"
  prompt:
    description: "Declared Prompt slug (must already exist in the project's anseo.yaml)."
    required: false
  brand:
    description: "Brand name to check, as declared in anseo.yaml."
    required: false
  expect-rank-lte:
    description: "Maximum acceptable ranking (1 = top). The job fails if the observed rank is higher than this."
    required: false
  provider:
    description: "Reserved for the live visibility implementation (Story 3.2). Will restrict the check to a single Provider (openai, anthropic, gemini, perplexity, grok, mistral, openrouter). Currently surfaced in the run summary only — the CLI's check-visibility does not yet accept it."
    required: false
    default: ""
  api-base:
    description: "Reserved for the live visibility implementation (Story 3.2). The Anseo API base URL the live check will target; the current CLI check-visibility is a local/offline stub and does not yet accept it. Defaults to https://api.anseo.ai."
    required: false
    default: "https://api.anseo.ai"
  audit-url:
    description: "URL or sitemap URL to crawl when mode=audit."
    required: false
    default: ""
  audit-fail-on:
    description: "Audit fail threshold: a rule id or severity (low, medium, high)."
    required: false
    default: "high"
  audit-max-pages:
    description: "Maximum owned pages to crawl when mode=audit."
    required: false
    default: "25"

outputs:
  observed-rank:
    description: "The observed ranking position (integer, or 'null' when the brand was absent)."
  matched-runs:
    description: "Count of Prompt Runs evaluated for this check."
  audit-score:
    description: "Overall audit citation-readiness score, 0-100."
  audit-failed-findings:
    description: "Count of findings that tripped the audit gate."

runs:
  using: "docker"
  image: "Dockerfile"
  args:
    - "${{ inputs.prompt }}"
    - "${{ inputs.brand }}"
    - "${{ inputs.expect-rank-lte }}"
    - "${{ inputs.provider }}"
    - "${{ inputs.api-base }}"
    - "${{ inputs.audit-url }}"
    - "${{ inputs.audit-fail-on }}"
    - "${{ inputs.audit-max-pages }}"
    - "${{ inputs.mode }}"

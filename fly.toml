app = "anseo-api"
primary_region = "iad"

[build]
dockerfile = "apps/api/Dockerfile"

[env]
ANSEO_API_BIND    = "0.0.0.0:8080"
ANSEO_DISABLE_KEYRING = "1"
RUST_LOG          = "info"

[http_service]
internal_port      = 8080
force_https        = true
auto_start_machines = true
auto_stop_machines  = true
min_machines_running = 0

  [http_service.concurrency]
  type       = "requests"
  soft_limit = 200
  hard_limit = 250

[[vm]]
size   = "shared-cpu-1x"
memory = "512mb"

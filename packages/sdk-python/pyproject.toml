[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "anseo-observe"
version = "0.1.0"
description = "Thin instrumentation SDK to POST externally-executed LLM runs to the Anseo Run-Ingestion API (POST /v1/ingest/run)."
readme = "README.md"
license = { text = "MIT" }
requires-python = ">=3.9"
# Zero runtime dependencies — standard-library urllib only.
dependencies = []

[project.optional-dependencies]
test = ["pytest>=7"]

[project.urls]
Homepage = "https://anseo.ai"
Source = "https://github.com/opengeo/opengeo"

[tool.setuptools.packages.find]
where = ["."]
include = ["anseo_observe*"]

[tool.pytest.ini_options]
testpaths = ["tests"]
